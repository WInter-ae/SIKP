metadata_pr:
  judul: "Integrasi E-Signature Mentor, Optimalisasi Logbook & Pembersihan Sistem"
  deskripsi: "Pull Request ini menggabungkan fitur e-signature mentor, sinkronisasi profil SSO yang robust, generasi logbook PDF/DOCX, serta pembersihan artefak sisa pengembangan untuk memastikan sistem stabil dan bersih."
  cabang:
    frontend: "Generate-Saat-Magang"
    backend: "Integrasi-Backend-Saat-Magang"
  target_cabang: "main"

perubahan:
  frontend:
    - nama: "Optimalisasi Generasi Dokumen"
      detail: "Implementasi konversi otomatis URL tanda tangan ke Base64 untuk memastikan gambar muncul pada PDF/DOCX tanpa kendala CORS."
    - nama: "Sinkronisasi Tanda Tangan SVG"
      detail: "Pembaruan layanan tanda tangan untuk mendukung dan menormalisasi format SVG mentah dari SSO."
    - nama: "Integrasi Profil SSO"
      detail: "Relokasi rute profil mentor ke sistem SSO eksternal dan penambahan tautan profil pada sidebar."
    - nama: "Pembersihan Artefak Pengujian"
      detail: "Penghapusan contoh implementasi lama dan dokumentasi migrasi yang sudah tidak relevan."

  backend:
    - nama: "Sinkronisasi E-Signature & Database"
      detail: "Implementasi sinkronisasi tanda tangan otomatis dari SSO dan pengaktifan kembali kolom file pada tabel penilaian (assessments) melalui migrasi database."
    - nama: "Encoding SVG yang Stabil"
      detail: "Perbaikan logika pengkodean SVG ke Base64 yang mendukung karakter non-Latin1 untuk mencegah kegagalan sinkronisasi."
    - nama: "Fallback Resolusi Profil"
      detail: "Penambahan mekanisme fallback menggunakan Identity ID untuk memastikan profil mentor tetap ditemukan meskipun Profile ID berubah."
    - nama: "Pembersihan Sistem & Logging"
      detail: "Penghapusan arsip migrasi lama (drizzle-archive) dan skrip pengujian sisa tahap pelaksanaan, serta penambahan logging detail untuk debugging SSO."

status: "Siap untuk Digabungkan"
prioritas: "Tinggi"
